<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小学数学出卷工具</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"Microsoft YaHei",sans-serif;background:#f0f2f5;color:#333;min-height:100vh}
.header{background:#1a73e8;color:#fff;padding:14px 24px;text-align:center}
.header h1{font-size:22px;font-weight:600}
.header p{font-size:13px;opacity:.85;margin-top:2px}
.container{max-width:960px;margin:0 auto;padding:16px}
.controls{background:#fff;border-radius:10px;padding:18px 22px;margin-bottom:18px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.control-row{display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin-bottom:12px}
.control-row:last-child{margin-bottom:0}
.control-label{font-size:14px;font-weight:600;min-width:55px;color:#555}
select,input[type=number]{padding:7px 10px;border:1px solid #d0d5dd;border-radius:6px;font-size:14px;background:#fff}
select{min-width:155px}
input[type=number]{width:70px}

/* 模式切换 */
.mode-switch{display:inline-flex;background:#e8eaed;border-radius:8px;padding:3px}
.mode-btn{padding:7px 16px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:#666;transition:all .2s}
.mode-btn.active{background:#fff;color:#1a73e8;box-shadow:0 1px 3px rgba(0,0,0,.12)}

/* 知识点 */
.kp-tags{display:flex;flex-wrap:wrap;gap:8px}
.kp-tag{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border:1.5px solid #d0d5dd;border-radius:18px;font-size:12px;cursor:pointer;user-select:none;transition:all .2s;background:#fff}
.kp-tag:hover{border-color:#1a73e8}
.kp-tag.active{background:#e8f0fe;border-color:#1a73e8;color:#1a73e8;font-weight:600}

/* 滑块 */
.slider-group{display:flex;align-items:center;gap:10px;flex:1;min-width:180px}
.slider-group input[type=range]{flex:1;accent-color:#1a73e8}
.slider-val{font-weight:700;color:#1a73e8;min-width:38px;text-align:center;font-size:14px}

/* 按钮 */
.btn{padding:9px 20px;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:#1a73e8;color:#fff}
.btn-primary:hover{background:#1557b0}
.btn-secondary{background:#fff;color:#1a73e8;border:1.5px solid #1a73e8}
.btn-secondary:hover{background:#e8f0fe}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-row{display:flex;gap:10px;margin-top:4px}

/* 试卷信息行 */
.exam-info{display:flex;gap:20px;font-size:13px;color:#1a73e8;font-weight:600;margin-bottom:10px}

/* 预览 */
.preview{background:#fff;border-radius:10px;padding:30px 34px;box-shadow:0 1px 4px rgba(0,0,0,.08);font-size:15px;line-height:1.9;display:none}
.preview.show{display:block}
.paper-title{text-align:center;font-size:20px;font-weight:700;margin-bottom:2px}
.paper-subtitle{text-align:center;font-size:13px;color:#888;margin-bottom:6px}
.paper-meta{display:flex;justify-content:space-between;font-size:12px;color:#666;margin-bottom:14px;border-bottom:1px dashed #e0e0e0;padding-bottom:8px}
.section-title{font-size:16px;font-weight:700;margin:18px 0 8px;padding:6px 10px;background:#f5f7fa;border-radius:4px}
.section-inst{font-size:12px;color:#888;margin-bottom:8px}
.subsection-title{font-size:14px;font-weight:600;margin:10px 0 4px}
.question-item{margin-bottom:12px;padding:8px 0;border-bottom:1px dotted #f0f0f0}
.q-index{font-weight:700;color:#1a73e8;margin-right:4px}
.q-type{font-size:11px;color:#999;margin-left:2px}
.q-points{font-size:11px;color:#e67e22;float:right}
.q-text{margin:3px 0}
.q-options{margin:3px 0 3px 18px;color:#555}
.q-answer-line{color:#999;font-size:12px}
.subsection-title{font-weight:600;color:#555;margin:10px 0 4px}
.warning{background:#fff3cd;border:1px solid #ffc107;border-radius:6px;padding:8px 14px;margin-bottom:10px;font-size:13px;color:#856404;display:none}
.warning.show{display:block}

/* 套卷特有样式 */
.exam-header-line{display:flex;justify-content:space-between;font-size:12px;color:#666;border:2px solid #333;padding:8px 12px;margin-bottom:16px}
.exam-header-line span{font-weight:600}
.total-score-row{text-align:right;font-size:13px;color:#e67e22;margin-top:16px;border-top:1px solid #ddd;padding-top:8px;font-weight:600}

@media(max-width:600px){.container{padding:8px}.controls{padding:12px}.preview{padding:16px}.header h1{font-size:18px}}
</style>
</head>
<body>

<div class="header"><h1>📐 小学数学出卷工具</h1><p id="headerSubtitle">冀教版2024新版</p></div>

<div class="container">
<div class="controls">
  <div class="control-row">
    <span class="control-label">模式</span>
    <div class="mode-switch">
      <button class="mode-btn active" data-mode="free" id="modeFree">📝 自由组卷</button>
      <button class="mode-btn" data-mode="exam" id="modeExam">📋 套卷模式</button>
    </div>
    <span class="control-label" style="margin-left:8px">年级</span>
    <select id="gradeSelect"><option value="">-- 请选择 --</option></select>
    <span id="examInfoBox" class="exam-info" style="display:none"></span>
  </div>

  <!-- 自由组卷专属 -->
  <div id="freeModeControls">
    <div class="control-row">
      <span class="control-label">知识点</span>
      <div class="kp-tags" id="kpTags"><span style="color:#999;font-size:13px">请先选择年级</span></div>
    </div>
    <div class="control-row">
      <span class="control-label">总题数</span>
      <input type="number" id="totalQuestions" value="15" min="1" max="100">
      <span class="control-label" style="margin-left:8px">模板比例</span>
      <div class="slider-group">
        <span style="font-size:11px;color:#999">静态</span>
        <input type="range" id="templateRatio" value="50" min="0" max="100" step="10">
        <span style="font-size:11px;color:#999">模板</span>
        <span class="slider-val" id="ratioVal">50%</span>
      </div>
    </div>
    <div class="control-row">
      <span class="control-label">难度</span>
      <input type="number" id="diffMin" value="1" min="1" max="5" style="width:55px">
      <span>~</span><input type="number" id="diffMax" value="5" min="1" max="5" style="width:55px">
    </div>
  </div>

  <!-- 套卷专属 -->
  <div id="examModeControls" style="display:none">
    <div class="control-row">
      <span class="control-label">年级</span>
      <span id="examGradeLabel" style="font-size:14px;color:#555">--</span>
      <span style="font-size:13px;color:#999">（自动匹配期末试卷结构）</span>
    </div>
  </div>

  <div class="warning" id="warning"></div>
  <div class="btn-row">
    <button class="btn btn-primary" id="btnGenerate">🎲 生成试卷</button>
    <button class="btn btn-secondary" id="btnDownload" disabled>📥 下载Word</button>
    <button class="btn btn-secondary" id="btnPrint" disabled>🖨 打印</button>
  </div>
</div>

<div class="preview" id="preview"></div>
</div>

<script>
// ═══════════════════════════════════════════
//  引擎代码（内联）
// ═══════════════════════════════════════════

class Filler{constructor(o){this.maxRetries=(o&&o.maxRetries)||200}
fill(t){for(let a=0;a<this.maxRetries;a++){let s=this._fs(t.slots);if(this._cc(t.constraints,s)){let q=this._r(t.template,s),ans=this._ca(t.answer,s);return{id:t.id,type:t.type,question:q,knowledgePoints:t.knowledgePoints,difficulty:t.difficulty,errorProne:t.errorProne,slots:s,answer:ans,source:t.source||''}}}throw new Error('填充失败:'+t.id)}
fillBatch(t,n){let r=[],seen=new Set();for(let i=0;i<n*50&&r.length<n;i++){try{let q=this.fill(t);if(!seen.has(q.question)){seen.add(q.question);r.push(q)}}catch(e){}}return r}
_fs(d){let s={};for(let[k,v]of Object.entries(d)){if(v.type==='range'){let st=v.step||1,steps=Math.floor((v.max-v.min)/st);let val=v.min+Math.floor(Math.random()*(steps+1))*st;if(st<1){let dc=String(st).split('.')[1]?.length||0;val=parseFloat(val.toFixed(dc))}s[k]=val}else if(v.type==='pick'){s[k]=v.values[Math.floor(Math.random()*v.values.length)]}}for(let[k,v]of Object.entries(d)){if(v.type==='computed')s[k]=this._ev(v.expr,s)}return s}
_cc(c,s){if(!c||c.length===0)return true;for(let x of c){try{if(!this._ev(x.check,s))return false}catch(e){return false}}return true}
_ev(e,s){let ks=Object.keys(s),vs=Object.values(s);let fn=new Function(...ks,'_M','_pI','_pF','return ('+e+');');let r=fn(...vs,Math,parseInt,parseFloat);if(typeof r==='number'&&!Number.isInteger(r))return parseFloat(r.toFixed(10));return r}
_r(t,s){return t.replace(/\{(\w+)\}/g,(m,n)=>s[n]!==undefined?String(s[n]):m)}
_ca(d,s){if(!d)return{finalAnswer:'',steps:[]};if(d.type==='expression'){let v=this._ev(d.expr,s);return{finalAnswer:d.unit?v+d.unit:String(v),steps:[]}}if(d.type==='steps'){let st=d.steps.map(x=>{let l=this._r(x.label,s),v=this._ev(x.expr,s);return{label:l,value:x.unit?v+x.unit:String(v)}});return{finalAnswer:st[st.length-1]?.value||'',steps:st}}return{finalAnswer:'',steps:[]}}}

class Generator{constructor(o){this.filler=(o&&o.filler)||new Filler()}
generate(o){let{meta:m,staticQuestions:sq,templates:tp,totalQuestions:tq,templateRatio:tr,knowledgePoints:kp,difficultyRange:dr,title:ti}=o;let[dMin,dMax]=dr||[1,5];let fs=(sq||[]).filter(q=>q.difficulty>=dMin&&q.difficulty<=dMax),ft=(tp||[]).filter(t=>t.difficulty>=dMin&&t.difficulty<=dMax);if((kp||[]).length>0){fs=fs.filter(q=>q.knowledgePoints.some(k=>kp.includes(k)));ft=ft.filter(t=>t.knowledgePoints.some(k=>kp.includes(k)))}let tc=Math.round((tq||20)*(tr||.5)),sc=(tq||20)-tc;if(tc>ft.length){sc=Math.min(sc+tc-ft.length,fs.length);tc=ft.length}if(sc>fs.length){tc=Math.min(tc+sc-fs.length,ft.length);sc=fs.length}let ps=this._pk(fs,sc),pt=this._pk(ft,tc),filled=[];for(let t of pt){try{let f=this.filler.fill(t);filled.push({type:f.type,question:f.question,answer:f.answer,difficulty:f.difficulty,knowledgePoints:f.knowledgePoints,source:'template'})}catch(e){}}let qs=[...ps.map(q=>({type:q.type,question:q.question,options:q.options||[],answer:(typeof q.answer==='string')?{finalAnswer:q.answer,steps:[]}:(q.answer||{finalAnswer:'',steps:[]}),difficulty:q.difficulty,knowledgePoints:q.knowledgePoints,source:'static'})),...filled];qs=this._st(this._sh(qs));qs.forEach((q,i)=>q.index=i+1);return{title:ti||((m?m.subjectName:'数学')+'练习题'),subtitle:m?[m.gradeLabel,m.semester,m.textbook].filter(Boolean).join(' · '):'',config:{totalQuestions:qs.length,templateRatio:tr,templateCount:filled.length,staticCount:ps.length,knowledgePoints:kp||[],difficultyRange:[dMin,dMax]},questions:qs,answerKey:qs.map(q=>({index:q.index,answer:q.answer.finalAnswer,steps:q.answer.steps||[]}))}}
generateExam(o){let{exam:e,meta:m,staticQuestions:sq,templates:tp}=o,questions=[],qIdx=0,sections=[];for(let sec of e.sections){let secQs=[],renderedSubs=[];if(sec.subSections){for(let sub of sec.subSections){let subQs=[];for(let it of(sub.items||[])){let pk=this._peq(it,sq,tp,qIdx);pk.forEach(q=>{qIdx++;q.index=qIdx;subQs.push(q);secQs.push(q)})}renderedSubs.push({name:sub.name,instruction:sub.instruction||'',questions:subQs})}}else{for(let it of(sec.items||[])){let pk=this._peq(it,sq,tp,qIdx);pk.forEach(q=>{qIdx++;q.index=qIdx;secQs.push(q)})}}questions.push(...secQs);sections.push({name:sec.name,instruction:sec.instruction||'',totalPoints:sec.totalPoints||0,subSections:renderedSubs.length>0?renderedSubs:null,questions:renderedSubs.length>0?[]:secQs})}return{title:e.title||(m.subjectName+'期末测试卷'),subtitle:[m.gradeLabel,m.semester,m.textbook].filter(Boolean).join(' · '),totalScore:e.totalScore||100,duration:e.duration||60,headerFields:e.headerFields||['班级____','姓名____','得分____'],generatedAt:new Date().toISOString(),mode:'exam',sections,questions,answerKey:questions.map(q=>({index:q.index,points:q.points,answer:q.answer.finalAnswer,steps:q.answer.steps||[]}))}}
_peq(it,sq,tp,si){let{count:c,type:t,pointsEach:pt,knowledgePoints:kp,sourceType:st}=it,pool=[];if(st==='static')pool=(sq||[]).filter(q=>q.type===t);else if(st==='template')pool=(tp||[]).filter(x=>x.type===t);else{pool=[...((sq||[]).filter(q=>q.type===t)),...((tp||[]).filter(x=>x.type===t))]}if(kp&&kp.length>0)pool=pool.filter(q=>q.knowledgePoints.some(k=>kp.includes(k)));let picked=this._pk(pool,c),results=[];for(let q of picked){if(q.template!==undefined){try{let f=this.filler.fill(q);results.push({type:f.type,question:f.question,options:q.options||[],answer:f.answer,difficulty:f.difficulty,points:pt,source:'template'})}catch(e){}}else{results.push({type:q.type,question:q.question,options:q.options||[],answer:(typeof q.answer==='string')?{finalAnswer:q.answer,steps:[]}:(q.answer||{finalAnswer:'',steps:[]}),difficulty:q.difficulty,points:pt,source:'static'})}}return results}
_pk(a,n){if(n<=0)return[];if(n>=a.length)return[...a];let r=[...a];for(let i=0;i<n;i++){let j=i+Math.floor(Math.random()*(r.length-i));[r[i],r[j]]=[r[j],r[i]]}return r.slice(0,n)}
_sh(a){let r=[...a];for(let i=r.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]]}return r}
_st(q){return q.sort((a,b)=>a.difficulty!==b.difficulty?a.difficulty-b.difficulty:Math.random()-.5)}}

// ═══════════════════════════════════════════
//  应用逻辑
// ═══════════════════════════════════════════

const gen = new Generator();
let currentPaper = null;
let currentMode = 'free'; // 'free' | 'exam'

// 初始化年级下拉
const gradeSelect = document.getElementById('gradeSelect');
for (const g of Object.keys(BANK)) {
  const opt = document.createElement('option');
  opt.value = g;
  const m = BANK[g].meta;
  opt.textContent = (m.subjectName||'') + ' ' + (m.gradeLabel||'') + ' ' + (m.semester||'');
  gradeSelect.appendChild(opt);
}

// 模式切换
document.getElementById('modeFree').addEventListener('click', () => switchMode('free'));
document.getElementById('modeExam').addEventListener('click', () => switchMode('exam'));

function switchMode(mode) {
  currentMode = mode;
  document.getElementById('modeFree').classList.toggle('active', mode==='free');
  document.getElementById('modeExam').classList.toggle('active', mode==='exam');
  document.getElementById('freeModeControls').style.display = mode==='free'?'':'none';
  document.getElementById('examModeControls').style.display = mode==='exam'?'':'none';
  updateExamInfo();
}

// 年级切换
gradeSelect.addEventListener('change', () => {
  const g = gradeSelect.value;
  const kpTags = document.getElementById('kpTags');
  kpTags.innerHTML = '';
  if (!g) { kpTags.innerHTML = '<span style="color:#999;font-size:13px">请先选择年级</span>'; return; }
  const meta = BANK[g].meta;
  document.getElementById('headerSubtitle').textContent = meta.textbook || '';
  for (const kp of (meta.knowledgePoints||[])) {
    const tag = document.createElement('span');
    tag.className = 'kp-tag active';
    tag.dataset.kpId = kp.id;
    tag.textContent = kp.name;
    tag.title = '难度:'+kp.difficulty + (kp.subTopics?' | 含:'+kp.subTopics.join('、'):'');
    tag.addEventListener('click', () => tag.classList.toggle('active'));
    kpTags.appendChild(tag);
  }
  updateExamInfo();
});

function updateExamInfo() {
  const g = gradeSelect.value;
  const box = document.getElementById('examInfoBox');
  if (!g || !BANK[g].exam) { box.style.display = 'none'; return; }
  const e = BANK[g].exam;
  box.style.display = 'flex';
  box.innerHTML = '<span>📋 满分:'+e.totalScore+'分</span><span>⏱ '+e.duration+'分钟</span><span>📝 '+e.sections.length+'大题</span>';
}

// 滑块
document.getElementById('templateRatio').addEventListener('input', function(){
  document.getElementById('ratioVal').textContent = this.value + '%';
});

// 生成
document.getElementById('btnGenerate').addEventListener('click', () => {
  const g = gradeSelect.value;
  if (!g) { showWarning('请先选择年级'); return; }

  const bank = BANK[g];

  if (currentMode === 'exam') {
    if (!bank.exam) { showWarning('该年级暂未配置套卷，请切换到自由组卷模式'); return; }
    currentPaper = gen.generateExam({
      exam: bank.exam,
      meta: bank.meta,
      staticQuestions: bank.staticQuestions,
      templates: bank.templates,
    });
  } else {
    const activeTags = document.querySelectorAll('#kpTags .kp-tag.active');
    const knowledgePoints = Array.from(activeTags).map(t => t.dataset.kpId);
    if (knowledgePoints.length === 0) { showWarning('请至少选择一个知识点'); return; }
    const totalQuestions = parseInt(document.getElementById('totalQuestions').value) || 15;
    const templateRatio = parseInt(document.getElementById('templateRatio').value) / 100;
    const diffMin = parseInt(document.getElementById('diffMin').value) || 1;
    const diffMax = parseInt(document.getElementById('diffMax').value) || 5;
    currentPaper = gen.generate({
      meta: bank.meta, staticQuestions: bank.staticQuestions, templates: bank.templates,
      totalQuestions, templateRatio, knowledgePoints, difficultyRange: [diffMin, diffMax]
    });
  }

  renderPreview(currentPaper);
  document.getElementById('btnDownload').disabled = false;
  document.getElementById('btnPrint').disabled = false;
  hideWarning();
});

function renderPreview(paper) {
  const preview = document.getElementById('preview');
  const typeLabels = {calculation:'计算',fill_blank:'填空',true_false:'判断',choice:'选择',application:'应用'};
  let html = '';

  if (paper.mode === 'exam') {
    // 套卷排版
    html += '<div class="paper-title">' + paper.title + '</div>';
    html += '<div class="paper-subtitle">' + paper.subtitle + '</div>';
    html += '<div class="exam-header-line">';
    html += paper.headerFields.map(f => '<span>' + f + '</span>').join('');
    html += '<span>满分:' + paper.totalScore + '分 | ' + paper.duration + '分钟</span>';
    html += '</div>';

    for (const sec of paper.sections) {
      html += '<div class="section-title">' + sec.name + '</div>';
      if (sec.instruction) html += '<div class="section-inst">' + sec.instruction + '</div>';

      if (sec.subSections) {
        for (const sub of sec.subSections) {
          html += '<div class="subsection-title">' + (sub.name||'') + '</div>';
          if (sub.instruction) html += '<div class="section-inst">' + sub.instruction + '</div>';
          for (const q of (sub.questions || [])) {
            html += renderOneQuestion(q, typeLabels);
          }
        }
      } else {
        for (const q of (sec.questions || [])) {
          html += renderOneQuestion(q, typeLabels);
        }
      }
    }
    html += '<div class="total-score-row">总分: ' + paper.totalScore + '分</div>';

  } else {
    // 自由组卷排版
    html += '<div class="paper-title">' + paper.title + '</div>';
    html += '<div class="paper-subtitle">' + paper.subtitle + '</div>';
    html += '<div class="paper-meta">';
    html += '<span>题数:' + paper.config.totalQuestions + ' | 模板:' + paper.config.templateCount + ' | 静态:' + paper.config.staticCount + '</span>';
    html += '<span>知识点:' + (paper.config.knowledgePoints.join('、')||'全部') + '</span>';
    html += '</div>';
    for (const q of paper.questions) { html += renderOneQuestion(q, typeLabels); }
  }

  preview.innerHTML = html;
  preview.classList.add('show');
  preview.scrollIntoView({behavior:'smooth'});
}

function renderOneQuestion(q, typeLabels) {
  let h = '<div class="question-item">';
  h += '<span class="q-index">' + q.index + '.</span>';
  h += '<span class="q-type">[' + (typeLabels[q.type]||q.type) + ']</span>';
  if (q.points) h += '<span class="q-points">(' + q.points + '分)</span>';
  h += '<div class="q-text">' + q.question + '</div>';
  if (q.options&&q.options.length>0) h += '<div class="q-options">' + q.options.join('&emsp;') + '</div>';
  h += '<div class="q-answer-line">答案: ' + q.answer.finalAnswer;
  if (q.answer.steps&&q.answer.steps.length>0) h += ' (' + q.answer.steps.map(s=>s.label+'='+s.value).join(' → ') + ')';
  h += '</div></div>';
  return h;
}

// 下载Word
document.getElementById('btnDownload').addEventListener('click', () => {
  if (!currentPaper) return;
  const doc = currentPaper.mode === 'exam' ? buildExamDoc(currentPaper) : buildFreeDoc(currentPaper);
  const blob = new Blob(['﻿' + doc], {type:'application/msword;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (currentPaper.title||'试卷') + '.doc';
  a.click();
  URL.revokeObjectURL(a.href);
});

function buildFreeDoc(paper) {
  let h = docHead(paper);
  h += '<h1>' + paper.title + '</h1><h3>' + paper.subtitle + '</h3>';
  h += '<div class="info">共' + paper.config.totalQuestions + '题</div>';
  for (const q of paper.questions) h += docQuestion(q);
  h += docAnswerPage(paper);
  return h + '</body></html>';
}

function buildExamDoc(paper) {
  let h = docHead(paper);
  h += '<h1>' + paper.title + '</h1><h3>' + paper.subtitle + '</h3>';
  // 密封线
  h += '<div class="seal">' + paper.headerFields.join('&emsp;') + '&emsp;满分:' + paper.totalScore + '分&emsp;时间:' + paper.duration + '分钟</div>';

  for (const sec of paper.sections) {
    h += '<div class="sec-title">' + sec.name + '</div>';
    if (sec.instruction) h += '<div class="sec-inst">' + sec.instruction + '</div>';

    if (sec.subSections) {
      for (const sub of sec.subSections) {
        h += '<div class="sub-title">' + (sub.name||'') + '</div>';
        if (sub.instruction) h += '<div class="sub-inst">' + sub.instruction + '</div>';
        for (const q of (sub.questions || [])) h += docExamQuestion(q);
      }
    } else {
      for (const q of (sec.questions || [])) h += docExamQuestion(q);
    }
  }

  h += '<div class="score-row">总分: ' + paper.totalScore + '分</div>';
  h += docExamAnswerPage(paper);
  return h + '</body></html>';
}

function docHead(paper) {
  return '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word"><head><meta charset="utf-8"><style>' +
    'body{font-family:"Microsoft YaHei",SimSun;font-size:14px;line-height:2;padding:25px}' +
    'h1{text-align:center;font-size:20px}h3{text-align:center;color:#666;font-size:13px;font-weight:normal}' +
    '.info{color:#999;font-size:12px;margin-bottom:8px;border-bottom:1px dashed #ccc;padding-bottom:4px}' +
    '.seal{border:2px solid #333;padding:10px 14px;margin-bottom:18px;font-size:13px;display:flex;justify-content:space-between}' +
    '.sec-title{font-size:16px;font-weight:700;margin:18px 0 6px;padding:4px 8px;background:#f0f0f0}' +
    '.sec-inst{font-size:12px;color:#888;margin-bottom:8px}' +
    '.sub-title{font-weight:600;margin:10px 0 2px}' +
    '.sub-inst{font-size:12px;color:#888;margin-bottom:6px}' +
    '.q{margin-bottom:10px;padding-bottom:6px;border-bottom:1px dotted #eee}' +
    '.qi{font-weight:700;color:#1a73e8}.qp{color:#e67e22;font-size:11px;float:right}' +
    '.ans{color:#999;font-size:12px}' +
    '.page-break{page-break-before:always}' +
    '.score-row{text-align:right;font-weight:700;color:#e67e22;margin-top:16px;border-top:1px solid #ddd;padding-top:8px}' +
    '@page{size:A4;margin:1.8cm}</style></head><body>';
}

function docQuestion(q) {
  let h = '<div class="q"><span class="qi">' + q.index + '.</span> ' + q.question + '<br>';
  if (q.options&&q.options.length>0) h += '&emsp;' + q.options.join('&emsp;') + '<br>';
  h += '<span class="ans">答案: ' + q.answer.finalAnswer + '</span></div>';
  return h;
}

function docExamQuestion(q) {
  let h = '<div class="q"><span class="qi">' + q.index + '.</span>';
  if (q.points) h += '<span class="qp">(' + q.points + '分)</span>';
  h += ' ' + q.question + '<br>';
  if (q.options&&q.options.length>0) h += '&emsp;' + q.options.join('&emsp;') + '<br>';
  return h; // 套卷不显示答案在题目下方
}

function docAnswerPage(paper) {
  let h = '<div class="page-break"></div><h1>参考答案</h1>';
  for (const q of paper.questions) {
    h += '<div class="q"><span class="qi">' + q.index + '.</span> ' + q.answer.finalAnswer;
    if (q.answer.steps&&q.answer.steps.length>0) h += ' <span class="ans">(' + q.answer.steps.map(s=>s.label+'='+s.value).join(' → ') + ')</span>';
    h += '</div>';
  }
  return h;
}

function docExamAnswerPage(paper) {
  let h = '<div class="page-break"></div><h1>参考答案</h1>';
  for (const q of paper.questions) {
    h += '<div class="q"><span class="qi">' + q.index + '.</span>';
    if (q.points) h += ' (' + q.points + '分) ';
    h += q.answer.finalAnswer;
    if (q.answer.steps&&q.answer.steps.length>0) h += ' <span class="ans">[' + q.answer.steps.map(s=>s.label+'='+s.value).join(' → ') + ']</span>';
    h += '</div>';
  }
  return h;
}

// 打印
document.getElementById('btnPrint').addEventListener('click', () => {
  if (!currentPaper) return;
  const win = window.open('','_blank');
  win.document.write(currentPaper.mode==='exam'?buildExamDoc(currentPaper):buildFreeDoc(currentPaper));
  win.document.close();
  setTimeout(()=>win.print(),500);
});

function showWarning(m){let w=document.getElementById('warning');w.textContent=m;w.classList.add('show')}
function hideWarning(){document.getElementById('warning').classList.remove('show')}
</script>
